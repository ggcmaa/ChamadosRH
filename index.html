<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Dados CMAA - Chamados</title>
    <!-- Fonte profissional do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILOS GERAIS --- */
        :root {
            --primary-color: #0d1117; 
            --green-dark: #1b853a;   
            --green-mid: #68c067;    
            --green-light: #b0d995;  
            --accent-gradient: linear-gradient(90deg, var(--green-light) 0%, var(--green-mid) 50%, var(--green-dark) 100%);
            --text-on-dark: #f0f6fc;
            --input-background: #161b22;
            --card-background: #1e242d;
            --success-color: #2ea44f;
            --error-color: #cb2431;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--primary-color);
            color: var(--text-on-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: all 0.3s ease;
        }

        /* --- CONTAINER PRINCIPAL --- */
        .portal-container {
            width: 90%;
            max-width: 500px;
            background-color: var(--card-background);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
            position: relative;
        }

        .portal-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            border-radius: 12px 12px 0 0;
            background: var(--accent-gradient);
        }

        /* --- TELA DE LOGIN --- */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-login {
            max-width: 300px;
            height: auto;
            margin-bottom: 40px;
        }

        .login-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: var(--green-light);
            text-align: center;
        }

        /* --- TELA DO FORMULÁRIO (CHAMADOS) --- */
        #ticket-screen {
            display: none;
            flex-direction: column;
        }

        .header-ticket {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(240, 246, 252, 0.1);
        }

        .logo-header {
            height: 40px;
            width: auto;
        }

        #logout-btn {
            background-color: transparent;
            color: #ccc;
            border: 1px solid #ccc;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.8rem;
        }

        #logout-btn:hover {
            border-color: var(--error-color);
            color: var(--error-color);
        }

        .welcome-msg {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            font-size: 1.2rem;
            color: #ddd;
        }

        /* --- COMPONENTES DE FORMULÁRIO COMUNS --- */
        .form-group {
            width: 100%;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #aaa;
        }

        input, textarea, select {
            width: 100%;
            padding: 15px 20px;
            font-size: 1rem;
            background-color: var(--input-background);
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 8px;
            color: var(--text-on-dark);
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--green-mid);
            box-shadow: 0 0 10px rgba(104, 192, 103, 0.3);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(240, 246, 252, 0.3);
        }

        /* --- BOTÃO PRINCIPAL COM GRADIENTE CMAA --- */
        .btn-submit {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            background: var(--accent-gradient);
            background-size: 200% 100%;
            background-position: left center;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(27, 133, 58, 0.4);
            background-position: right center;
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* --- FEEDBACK VISUAL --- */
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .feedback-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
            display: none;
        }

        .message-success {
            display: block;
            background-color: rgba(46, 164, 79, 0.2);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .message-error {
            display: block;
            background-color: rgba(203, 36, 49, 0.2);
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }

        @media (max-width: 600px) {
            .portal-container {
                width: 95%;
                padding: 25px;
            }
            .logo-login { max-width: 200px; }
            .login-title { font-size: 1.2rem; }
            input, textarea, select { padding: 12px 15px; }
        }
    </style>
</head>
<body>

    <div class="portal-container">
        
        <!-- 1. TELA DE LOGIN -->
        <section id="login-screen">
            <img src="CMAA - Energia que transforma - Novo.png" alt="CMAA Logo - Energia que transforma" class="logo-login">
            <h2 class="login-title">Acesso Restrito: Área de Dados</h2>
            
            <div class="form-group">
                <label for="username">Nome de Usuário / Email</label>
                <input type="text" id="username" placeholder="seu.usuario" required>
            </div>
            
            <div class="form-group">
                <label for="password">Senha de Acesso (Numérica)</label>
                <input type="number" id="password" placeholder="123456" required>
            </div>
            
            <button id="login-btn" class="btn-submit">
                <div class="loading-spinner" id="login-spinner"></div>
                ACESSAR PORTAL
            </button>
            
            <div class="feedback-message" id="login-message"></div>
        </section>

        <!-- 2. TELA DE ABERTURA DE CHAMADOS -->
        <section id="ticket-screen">
            <header class="header-ticket">
                <img src="CMAA - Energia que transforma - Novo.png" alt="CMAA Logo" class="logo-header">
                <div>
                    <span id="user-greeting" class="welcome-msg">Portal de Chamados</span>
                    <button id="logout-btn">Sair</button>
                </div>
            </header>
            
            <form id="ticket-form">
                <div class="form-group">
                    <label for="ticket_requester">Solicitante</label>
                    <input type="text" id="ticket_requester" readonly style="color: #666; cursor: not-allowed;">
                </div>

                <div class="form-group">
                    <label for="ticket_subject">Assunto (Resumo da Solicitação)</label>
                    <input type="text" id="ticket_subject" placeholder="Ex: Criação de relatório de treinamento" required>
                </div>
                
                <div class="form-group">
                    <label for="ticket_area">Área de Origem</label>
                    <select id="ticket_area" required>
                        <option value="" disabled selected>Selecione sua área...</option>
                        <option value="Adm. de pessoal">Adm. de pessoal</option>
                        <option value="DHO">DHO</option>
                        <option value="Recrutamento e Seleção">Recrutamento e Seleção</option>
                        <option value="Treinamentos">Treinamentos</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ticket_details">Detalhamento da Solicitação</label>
                    <textarea id="ticket_details" rows="6" placeholder="Descreva o que você precisa..." required></textarea>
                </div>
                
                <button type="submit" id="submit-ticket-btn" class="btn-submit">
                    <div class="loading-spinner" id="ticket-spinner"></div>
                    ABRIR CHAMADO
                </button>
            </form>
            
            <div class="feedback-message" id="ticket-message"></div>
        </section>

    </div>

    <script>
        const LOGIN_API_URL = "https://0cbbf36298f0e42e8f72ebb373f876.e6.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/18/workflows/13c4ca7aceb94a08bb90658d07fa1141/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=xtil9ZxsyJtRpn4IQnOr60f5DEgRecU4kzNSA9q3pug";
        const CREATE_TICKET_API_URL = "https://0cbbf36298f0e42e8f72ebb373f876.e6.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/24/workflows/839a3073fbce4e4ebbdf1e50d185a2f6/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=3QvB1vmMWA-nIhGf7PytjExXF6UYqgEdT_otSeB5Jcw";

        let currentUser = null;

        // --- LÓGICA DE LOGIN ---
        document.getElementById('login-btn').addEventListener('click', async function() {
            const usernameInput = document.getElementById('username').value.trim();
            const passwordRaw = document.getElementById('password').value.trim();
            const btn = document.getElementById('login-btn');
            const spinner = document.getElementById('login-spinner');
            const messageDiv = document.getElementById('login-message');

            messageDiv.className = 'feedback-message';
            messageDiv.style.display = 'none';

            if (!usernameInput || !passwordRaw) {
                showFeedback(messageDiv, 'Preencha o nome de usuário e a senha.', 'error');
                return;
            }

            const passwordInt = parseInt(passwordRaw, 10);

            if (isNaN(passwordInt)) {
                showFeedback(messageDiv, 'A senha deve conter apenas números inteiros.', 'error');
                return;
            }

            const loginData = {
                username: usernameInput,
                password: passwordInt
            };

            btn.disabled = true;
            spinner.style.display = 'block';
            btn.textContent = 'Autenticando...';

            try {
                const response = await fetch(LOGIN_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });

                if (response.status === 200) {
                    currentUser = usernameInput;
                    showTicketScreen(currentUser);
                } else if (response.status === 400) {
                    showFeedback(messageDiv, 'Usuário ou senha incorretos (Erro 400).', 'error');
                } else {
                    showFeedback(messageDiv, `Erro ao autenticar. Código de resposta: ${response.status}`, 'error');
                }

            } catch (error) {
                console.error('Erro no login:', error);
                showFeedback(messageDiv, 'Erro ao comunicar com a API de autenticação.', 'error');
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
                btn.textContent = 'ACESSAR PORTAL';
            }
        });

        // --- MUDANÇA DE TELA E LOGOUT ---
        function showTicketScreen(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('ticket-screen').style.display = 'flex';
            document.getElementById('user-greeting').textContent = `Olá, ${user.split('@')[0]}`;
            document.getElementById('ticket_requester').value = user;
        }

        document.getElementById('logout-btn').addEventListener('click', function() {
            currentUser = null;
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('ticket-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        });

        // --- LÓGICA DE CRIAÇÃO DO CHAMADO ---
        document.getElementById('ticket-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const requesterInput = document.getElementById('ticket_requester').value;
            const subjectInput = document.getElementById('ticket_subject').value;
            const areaInput = document.getElementById('ticket_area').value;
            const detailsInput = document.getElementById('ticket_details').value;
            
            const btn = document.getElementById('submit-ticket-btn');
            const spinner = document.getElementById('ticket-spinner');
            const messageDiv = document.getElementById('ticket-message');

            const ticketData = {
                id_solicitante: requesterInput,
                assunto: subjectInput,
                area: areaInput,
                detalhes: detailsInput,
                data_solicitacao: new Date().toISOString()
            };

            btn.disabled = true;
            spinner.style.display = 'block';
            btn.textContent = 'Criando chamado...';
            messageDiv.className = 'feedback-message';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch(CREATE_TICKET_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(ticketData)
                });

                if (response.status === 200) {
                    showFeedback(messageDiv, '✅ Chamado criado com sucesso! Sua solicitação foi enviada para a equipe de dados.', 'success');
                    document.getElementById('ticket_subject').value = '';
                    document.getElementById('ticket_area').value = '';
                    document.getElementById('ticket_details').value = '';
                } else {
                    showFeedback(messageDiv, `❌ Não foi possível criar o chamado. Código de erro: ${response.status}`, 'error');
                }

            } catch (error) {
                console.error('Erro na criação:', error);
                showFeedback(messageDiv, '❌ Erro ao comunicar com o servidor. Tente novamente.', 'error');
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
                btn.textContent = 'ABRIR CHAMADO';
            }
        });

        function showFeedback(element, message, type) {
            element.textContent = message;
            element.className = `feedback-message message-${type}`;
            element.style.display = 'block';
        }
    </script>
</body>
</html>
